version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: log-analytics-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - log-network

  # Backend API
  log-analytics-backend:
    build: ./server
    container_name: log-analytics-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/log-analytics
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - log-network
    restart: unless-stopped

  # Frontend
  log-analytics-frontend:
    build: ./client
    container_name: log-analytics-frontend
    ports:
      - "3000:80"
    depends_on:
      - log-analytics-backend
    networks:
      - log-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  log-network:
    driver: bridge
